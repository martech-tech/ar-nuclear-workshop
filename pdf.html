<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b2447">
  <title>ดาวน์โหลดชุดใบงาน — JKnowledge</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center;
      background: linear-gradient(160deg, #0b2447 0%, #19376d 55%, #146c94 100%); color: #fff;
      padding: 24px; box-sizing: border-box;
    }
    .card { max-width: 380px; }
    .logos { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 18px; }
    .logos .jk { width: 62px; height: 62px; }
    .logos .expo { height: 52px; width: auto; background: #fff; border-radius: 10px; padding: 4px 10px; }
    .icon { font-size: 3.4rem; margin-bottom: 6px; }
    h1 { font-size: 1.3rem; margin: 0 0 6px; }
    p { font-size: .95rem; line-height: 1.7; opacity: .92; margin: 0 0 18px; }
    a.btn {
      display: block; margin: 10px auto; padding: 14px 20px; max-width: 300px;
      border-radius: 30px; font-size: 1.05rem; font-weight: bold; text-decoration: none;
      background: #ffd93d; color: #0b2447; box-shadow: 0 4px 14px rgba(0,0,0,.35);
    }
    a.btn.alt { background: rgba(255,255,255,.14); color: #fff; font-size: .95rem; }
    .hint { font-size: .8rem; color: #9fd0ff; margin-top: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logos">
      <img class="jk" src="assets/logo-jk.png" alt="JKnowledge">
      <img class="expo" src="assets/logo-expo.png" alt="Thailand University TCAS Expo">
    </div>
    <div class="icon">📄</div>
    <h1>ชุดใบงานนักสำรวจพลังงาน</h1>
    <p>ใบงาน + เฉลย + วิธีเล่น (PDF 2 หน้า)<br>กำลังเริ่มดาวน์โหลดอัตโนมัติ...</p>
    <a class="btn" id="dl" href="assets/workshop-pack.pdf" download="JKnowledge-workshop-pack.pdf">⬇️ ดาวน์โหลดอีกครั้ง</a>
    <a class="btn alt" href="assets/workshop-pack.pdf" target="_blank" rel="noopener">👀 เปิดดูในเบราว์เซอร์</a>
    <div class="hint">iPhone: ไฟล์จะอยู่ในแอป "ไฟล์" (Files) หรือแตะ "เปิดดู" แล้วกดปุ่มแชร์ &gt; บันทึก<br>
      พิมพ์แจกในห้องเรียนได้เลย · jknowledgetutor.com</div>
  </div>
  <script>
    // เด้งดาวน์โหลดทันทีที่เปิดหน้า (จาก QR) — ผู้ใช้ไม่ต้องกดอะไร
    window.addEventListener('load', function () {
      setTimeout(function () { document.getElementById('dl').click(); }, 400);
    });
  </script>
</body>
</html>
